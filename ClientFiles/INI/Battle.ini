LongDescription=Atreides Mission 1 - First Strike@Location: Arrakis, Dune@@The Emperor has given House Atreides the opportunity to mine spice on Arrakis. Prove your worth by establishing a base and defending against initial Harkonnen resistance.@@Objective: Establish a base and eliminate Harkonnen forces.
